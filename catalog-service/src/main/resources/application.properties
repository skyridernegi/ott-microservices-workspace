# ======================================
# CATALOG SERVICE - Application Config
# ======================================

# Server
server.port=8081
spring.application.name=catalog-service

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/catalog_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=system
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialec #changing this dialact because after spring-cloud-version changed to 2025.0.1(for using FeignClient, Eureka discovery etc all comes under spring-clound),Spring Boot 3.5.x uses Hibernate 6.6+ under the hood. Hibernate 6 has completely dropped support for the generic org.hibernate.dialect.MySQLDialect class. 
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.ott.catalog=DEBUG
logging.level.org.springframework.web=INFO

#actuator
# -- Spring Boot Actuator — Monitoring -------------------------
# Expose all actuator endpoints (restrict in production)
# health = is service alive?
# info = app version, name
# metrics = memory, CPU, request counts
# env = environment properties
management.endpoints.web.exposure.include=health,info,metrics,env,loggers
management.endpoint.health.show-details=always
management.info.env.enabled=true

# App info shown at /actuator/info
info.app.name=Catalog Service
info.app.version=1.0.0
info.app.description=OTT Platform - Manages OTT subscription plans