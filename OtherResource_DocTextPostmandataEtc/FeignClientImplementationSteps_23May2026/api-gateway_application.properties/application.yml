# =====================================================
# API GATEWAY - Application Configuration
# =====================================================
# WHY YML instead of .properties?
# YML supports nested structure — much cleaner for
# complex Gateway routing config with multiple rules.
# =====================================================

server:
  port: 8080

spring:
  application:
    name: api-gateway

  # ── Redis (used by Rate Limiter) ──────────────────
  data:
    redis:
      host: localhost
      port: 6379
      # password: yourpassword   # uncomment if Redis has password

  # ── Spring Cloud Gateway Routes ──────────────────
  cloud:
    gateway:
      # Global CORS — allows Postman and browser to call the gateway
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

      routes:

        # ── ROUTE 1: Auth Service (NO JWT filter — public endpoint) ──
        # /auth/** goes directly to gateway's own AuthController
        # No JWT validation needed here — this is where you GET the token
        - id: auth-route
          uri: http://localhost:8080
          predicates:
            - Path=/auth/**

        # ── ROUTE 2: Catalog Service ──────────────────────────────────
        # All /catalog/** requests → forwarded to catalog-service:8081
        # JWT filter applied — must send valid token in Authorization header
        # Rate limiter applied — max 10 requests per second per user
        - id: catalog-service
          uri: http://localhost:8081
          predicates:
            - Path=/catalog/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10      # tokens added per second
                redis-rate-limiter.burstCapacity: 20      # max burst allowed
                redis-rate-limiter.requestedTokens: 1     # tokens per request
                key-resolver: "#{@userKeyResolver}"       # bean defined in RateLimiterConfig

        # ── ROUTE 3: Subscription Service ────────────────────────────
        # All /subscriptions/** and /users/** → subscription-service:8082
        # JWT filter applied + Rate limiter applied
        - id: subscription-service-subscriptions
          uri: http://localhost:8082
          predicates:
            - Path=/subscriptions/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        - id: subscription-service-users
          uri: http://localhost:8082
          predicates:
            - Path=/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

# ── JWT Configuration ─────────────────────────────
# secret: used to sign and verify JWT tokens
# expiration: token valid for 1 hour (3600000 ms)
jwt:
  secret: OTTPlatformSecretKeyForJWTTokenGenerationAndValidation2024
  expiration: 3600000

# ── Logging ──────────────────────────────────────
logging:
  level:
    com.ott.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.data.redis: INFO
