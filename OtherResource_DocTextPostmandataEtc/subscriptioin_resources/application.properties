# ==========================================
# SUBSCRIPTION SERVICE - Application Config
# ==========================================

# Server
server.port=8082
spring.application.name=subscription-service

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/subscription_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.ott.subscription=DEBUG
logging.level.org.springframework.web=INFO

# Catalog Service URL - Subscription calls Catalog to validate plan
catalog.service.url=http://localhost:8081
