# Server Configuration
server.port=8080

# Application Name
spring.application.name=api-gateway

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Global CORS Configuration
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations.[/**].allowedHeaders=*

# Route 1: Auth Route
spring.cloud.gateway.server.webflux.routes[0].id=auth-route
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8080
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

# Route 2: Catalog Service
spring.cloud.gateway.server.webflux.routes[1].id=catalog-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/catalog/**
spring.cloud.gateway.server.webflux.routes[1].filters[0].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.redis-rate-limiter.replenishRate=10
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.key-resolver=#{@userKeyResolver}

# Route 3: Subscription Service (Subscriptions)
spring.cloud.gateway.server.webflux.routes[2].id=subscription-service-subscriptions
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/subscriptions/**
spring.cloud.gateway.server.webflux.routes[2].filters[0].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.redis-rate-limiter.replenishRate=10
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.key-resolver=#{@userKeyResolver}

# Route 4: Subscription Service (Users)
spring.cloud.gateway.server.webflux.routes[3].id=subscription-service-users
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/users/**
spring.cloud.gateway.server.webflux.routes[3].filters[0].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[3].filters[0].args.redis-rate-limiter.replenishRate=10
spring.cloud.gateway.server.webflux.routes[3].filters[0].args.redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.server.webflux.routes[3].filters[0].args.redis-rate-limiter.requestedTokens=1
spring.cloud.gateway.server.webflux.routes[3].filters[0].args.key-resolver=#{@userKeyResolver}

# Security Configuration
jwt.secret=OTTPlatformSecretKeyForJWTTokenGenerationAndValidation2024
jwt.expiration=3600000

# Logging Levels
logging.level.com.ott.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.data.redis=INFO

# Actuator Endpoints Exposure
# Expose Actuator endpoints over the web, including Prometheus and Gateway control
management.endpoints.web.exposure.include=health,info,metrics,prometheus,gateway

# Show full details (components and status) for the health check endpoint
management.endpoint.health.show-details=always

# Explicitly enable the Spring Cloud Gateway Actuator endpoint
# management.endpoint.gateway.enabled=true
management.endpoint.gateway.access=unrestricted

# Metrics Configuration
# Apply a global application tag to all metrics for easier filtering in Prometheus/Grafana
management.metrics.tags.application=api-gateway

# Actuator Info Configuration
# Enable environment details visibility under the /actuator/info endpoint
management.info.env.enabled=true

# Application Metadata / Monitoring info
info.app.name=API Gateway
info.app.version=1.0.0
info.app.description=OTT Platform - API Gateway with JWT and Rate Limiting