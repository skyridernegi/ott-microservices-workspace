server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods: "*"
                allowedHeaders: "*"

          routes:
            - id: auth-route
              uri: http://localhost:8080
              predicates:
                - Path=/auth/**

            - id: catalog-service
              uri: http://localhost:8081
              predicates:
                - Path=/catalog/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@userKeyResolver}"

            - id: subscription-service-subscriptions
              uri: http://localhost:8082
              predicates:
                - Path=/subscriptions/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@userKeyResolver}"

            - id: subscription-service-users
              uri: http://localhost:8082
              predicates:
                - Path=/users/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@userKeyResolver}"

jwt:
  secret: OTTPlatformSecretKeyForJWTTokenGenerationAndValidation2024
  expiration: 3600000

logging:
  level:
    com.ott.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.data.redis: INFO

management:
  endpoints:
    web:
      exposure:
        # Expose Actuator endpoints over the web, including Prometheus and Gateway control
        include: [health, info, metrics, prometheus, gateway]
  endpoint:
    health:
      # Show full details (components and status) for the health check endpoint
      show-details: always
    gateway:
      # Explicitly enable the Spring Cloud Gateway Actuator endpoint
      enabled: true
  metrics:
    tags:
      # Apply a global application tag to all metrics for easier filtering in Prometheus/Grafana
      application: api-gateway
  info:
    env:
      # Enable environment details visibility under the /actuator/info endpoint
      enabled: true

info:
  app:
    name: API Gateway
    version: 1.0.0
    description: OTT Platform - API Gateway with JWT and Rate Limiting