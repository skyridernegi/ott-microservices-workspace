server.port=8086
spring.application.name=notification-service

# ── Kafka Configuration ────────────────────────────────────────────────
# When Kafka is running locally (docker or installed), uncomment these:
# spring.kafka.bootstrap-servers=localhost:9092
# spring.kafka.consumer.group-id=notification-group
# spring.kafka.consumer.auto-offset-reset=earliest
# spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ── Email Configuration (Gmail SMTP) ──────────────────────────────────
# To send real emails: uncomment and add your Gmail credentials
# IMPORTANT: Use App Password, not your actual Gmail password
# Get App Password: Google Account → Security → 2FA → App Passwords
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your.email@gmail.com
# spring.mail.password=your-app-password-here
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# ── Eureka ─────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ── Actuator ───────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=notification-service

logging.level.com.ott.notification=DEBUG