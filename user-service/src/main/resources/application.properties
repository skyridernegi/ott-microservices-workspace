spring.application.name=user-service
# =============================================
#   MySQL DataSource Configuration
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/userdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=system
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
 
# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=UserServiceHikariPool

# =============================================
#   JPA / Hibernate Configuration
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# =============================================
#   Actuator Endpoints
# =============================================
#management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
# Expose all actuator endpoints
#management.endpoints.web.exposure.include=


#lines to expose the Prometheus endpoint:
# Expose prometheus endpoint along with health and info
management.endpoints.web.exposure.include=health,info,metrics,prometheus
# Enable prometheus metrics
management.endpoint.prometheus.enabled=true
# Add application name tag to all metrics (very useful in Grafana)
management.metrics.tags.application=${spring.application.name}


# App Info
info.app.name=User Service
info.app.description=Spring Boot User Microservice with CRUD Operations
info.app.version=1.0.0
info.app.java.version=17

# Enable env & build info contributors
management.info.env.enabled=true